<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — 3D AI Chatbot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --neon: #00ffe7;
    --neon2: #bf00ff;
    --dark: #050a12;
    --panel: #0a1628;
    --glass: rgba(0, 255, 231, 0.05);
    --border: rgba(0, 255, 231, 0.15);
    --text: #c8e8ff;
    --dim: #4a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Header */
  header {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,10,18,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--neon);
    text-shadow: 0 0 20px var(--neon);
    letter-spacing: 4px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 10px #00ff88;
    animation: pulse 2s infinite;
    margin-left: auto;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status-text {
    font-size: 12px;
    color: #00ff88;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Main layout */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    height: calc(100vh - 57px);
    padding: 20px 16px;
    gap: 16px;
  }

  /* ===== 3D AVATAR SECTION ===== */
  .avatar-section {
    position: relative;
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }

  /* Outer ring */
  .ring-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(0,255,231,0.2);
    animation: rotateSlow 8s linear infinite;
  }

  .ring-outer::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 12px var(--neon);
    transform: translateX(-50%);
  }

  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .ring-mid {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1px solid rgba(191,0,255,0.2);
    animation: rotateSlow 5s linear infinite reverse;
  }

  .ring-mid::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--neon2);
    box-shadow: 0 0 10px var(--neon2);
    transform: translateX(-50%);
  }

  /* Avatar head */
  .avatar-head {
    position: absolute;
    inset: 24px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a3a5c, #050a12);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow:
      0 0 30px rgba(0,255,231,0.1),
      inset 0 0 30px rgba(0,0,0,0.8);
  }

  /* Face glow */
  .avatar-head::before {
    content: '';
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 30%;
    background: radial-gradient(ellipse, rgba(0,255,231,0.15), transparent);
  }

  /* Eyes container */
  .eyes {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
  }

  .eye {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 12px var(--neon), 0 0 24px rgba(0,255,231,0.5);
    position: relative;
    transition: transform 0.3s ease;
  }

  .eye.blink {
    animation: blink 0.15s ease-in-out;
  }

  @keyframes blink {
    0% { transform: scaleY(1); }
    50% { transform: scaleY(0.1); }
    100% { transform: scaleY(1); }
  }

  /* Talking animation */
  .mouth {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 6px;
    border-radius: 0 0 14px 14px;
    border: 1.5px solid rgba(0,255,231,0.6);
    border-top: none;
    transition: height 0.1s;
  }

  .mouth.talking {
    animation: talk 0.2s steps(1) infinite;
  }

  @keyframes talk {
    0% { height: 4px; width: 22px; }
    25% { height: 10px; width: 28px; }
    50% { height: 6px; width: 18px; }
    75% { height: 12px; width: 26px; }
    100% { height: 4px; width: 22px; }
  }

  /* Holographic lines on face */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,231,0.4), transparent);
    animation: scanFace 3s ease-in-out infinite;
  }

  @keyframes scanFace {
    0% { top: 5%; opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { top: 95%; opacity: 0; }
  }

  /* Avatar name */
  .avatar-name {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 6px;
    white-space: nowrap;
    text-shadow: 0 0 10px var(--neon);
  }

  /* Voice bars */
  .voice-bars {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    align-items: center;
    height: 20px;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--neon);
    opacity: 0.3;
    height: 4px;
    transition: height 0.1s;
  }

  .bar.active {
    animation: barBounce 0.4s ease-in-out infinite alternate;
    opacity: 1;
  }

  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.05s; }
  .bar:nth-child(4) { animation-delay: 0.15s; }
  .bar:nth-child(5) { animation-delay: 0.08s; }

  @keyframes barBounce {
    from { height: 4px; }
    to { height: 18px; }
  }

  /* ===== CHAT AREA ===== */
  .chat-area {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 4px;
    margin-top: 20px;
    scrollbar-width: none;
  }

  .chat-area::-webkit-scrollbar { display: none; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeSlideIn 0.3s ease;
    max-width: 100%;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  .msg.ai .msg-bubble {
    background: var(--glass);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 2px;
    box-shadow: 0 0 20px rgba(0,255,231,0.05);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(191,0,255,0.2), rgba(0,255,231,0.1));
    border: 1px solid rgba(191,0,255,0.3);
    color: #ffffff;
    border-bottom-right-radius: 2px;
  }

  .msg-icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .msg.ai .msg-icon {
    background: radial-gradient(circle, #0a2a3a, #050a12);
    border: 1px solid var(--border);
    color: var(--neon);
    box-shadow: 0 0 8px rgba(0,255,231,0.2);
  }

  .msg.user .msg-icon {
    background: rgba(191,0,255,0.15);
    border: 1px solid rgba(191,0,255,0.3);
    color: var(--neon2);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 10px 14px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon);
    animation: typingBounce 1s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 0.5px;
    padding: 4px 8px;
  }

  #userInput::placeholder { color: var(--dim); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 1px solid var(--neon);
    background: rgba(0,255,231,0.08);
    color: var(--neon);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: rgba(0,255,231,0.2);
    box-shadow: 0 0 15px rgba(0,255,231,0.3);
  }

  .send-btn:active { transform: scale(0.95); }

  /* Suggestions */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 100%;
  }

  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--neon);
    color: var(--neon);
    background: rgba(0,255,231,0.05);
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    border-color: rgba(0,255,231,0.15);
    border-style: solid;
  }

  .corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<header>
  <span class="logo">ARIA</span>
  <span style="color:var(--dim);font-size:12px;letter-spacing:2px;margin-left:8px">AI ASSISTANT</span>
  <span class="status-text" style="margin-left:auto;margin-right:8px">ONLINE</span>
  <div class="status-dot"></div>
</header>

<div class="main">
  <!-- 3D Avatar -->
  <div class="avatar-section">
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="avatar-head" id="avatarHead">
      <div class="scan-line"></div>
      <div class="eyes">
        <div class="eye" id="eyeL"></div>
        <div class="eye" id="eyeR"></div>
      </div>
      <div class="mouth" id="mouth"></div>
    </div>
    <div class="avatar-name">ARIA</div>
    <div class="voice-bars" id="voiceBars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
      <div class="bar" id="b5"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="msg ai">
      <div class="msg-icon">◈</div>
      <div class="msg-bubble">
        Namaste! Main ARIA hoon — ek 3D AI Assistant. Aap mujhse kuch bhi pooch sakte hain. Main yahan hoon! ✨
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendChip(this)">3D chatbot kya hai?</div>
    <div class="chip" onclick="sendChip(this)">Salon booking kaise kare?</div>
    <div class="chip" onclick="sendChip(this)">AI kya hota hai?</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Kuch bhi poochein..." />
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are ARIA, a futuristic 3D AI assistant. You speak in Hinglish (mix of Hindi and English).
Keep responses short (2-4 sentences max). Be helpful, friendly, and slightly futuristic in tone.
Use occasional Hindi words naturally. Don't use markdown formatting, just plain text.
Example style: "Bilkul! Main aapki help kar sakta hoon. Ye kaam bahut easy hai."`;

let isThinking = false;

// Auto blink eyes
function blinkEyes() {
  document.getElementById('eyeL').classList.add('blink');
  document.getElementById('eyeR').classList.add('blink');
  setTimeout(() => {
    document.getElementById('eyeL').classList.remove('blink');
    document.getElementById('eyeR').classList.remove('blink');
  }, 200);
}
setInterval(blinkEyes, 3000 + Math.random() * 2000);

// Avatar talking animation
function startTalking() {
  document.getElementById('mouth').classList.add('talking');
  document.querySelectorAll('.bar').forEach(b => b.classList.add('active'));
}

function stopTalking() {
  document.getElementById('mouth').classList.remove('talking');
  document.querySelectorAll('.bar').forEach(b => b.classList.remove('active'));
}

// Eye follow (subtle idle movement)
let eyeDir = 1;
setInterval(() => {
  eyeDir *= -1;
  const px = eyeDir * 2;
  document.querySelectorAll('.eye').forEach(e => {
    e.style.transform = `translateX(${px}px)`;
  });
}, 4000);

function sendChip(el) {
  document.getElementById('userInput').value = el.textContent;
  sendMessage();
}

function addMessage(text, role) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-icon">${role === 'ai' ? '◈' : '⬡'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-icon">◈</div>
    <div class="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

const conversationHistory = [];

async function sendMessage() {
  if (isThinking) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('suggestions').style.display = 'none';
  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });

  isThinking = true;
  document.getElementById('sendBtn').style.opacity = '0.4';
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Sorry, kuch problem ho gayi!';

    hideTyping();
    addMessage(reply, 'ai');
    conversationHistory.push({ role: 'assistant', content: reply });

    // Talking animation for duration proportional to reply length
    startTalking();
    const talkTime = Math.min(Math.max(reply.length * 30, 1000), 4000);
    setTimeout(stopTalking, talkTime);

  } catch (err) {
    hideTyping();
    addMessage('Oops! Network issue. Please try again.', 'ai');
  }

  isThinking = false;
  document.getElementById('sendBtn').style.opacity = '1';
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
